<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scaled Overlay Viewer - Pen 1</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
    }
    .wrap {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #d9e0e6;
      padding: 24px 20px;
      box-sizing: border-box;
    }
    .sidebar h1 {
      font-size: 20px;
      margin: 0 0 6px 0;
      color: #1f3b4d;
    }
    .sidebar p {
      font-size: 13px;
      color: #667;
      line-height: 1.45;
      margin-bottom: 18px;
    }
    .control-group {
      margin-bottom: 22px;
    }
    .control-group h2 {
      font-size: 14px;
      margin: 0 0 10px 0;
      color: #1f3b4d;
      border-bottom: 1px solid #e5e9ee;
      padding-bottom: 6px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      font-size: 14px;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .main {
      flex: 1;
      padding: 10px 14px;
      box-sizing: border-box;
    }
    .note {
      margin-top: 18px;
      font-size: 12px;
      color: #666;
      line-height: 1.45;
    }
    #plot {
      width: 100%;
      height: 92vh;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sidebar">
      <h1>Pen 1 Scaled Overlay</h1>
      <p>Toggle layers on and off to compare relative spatial intensity patterns across microbial, chemical, and pH variables.</p>

      <div class="control-group">
        <h2>Microbial</h2>
        <label class="check-row"><input type="checkbox" id="mac" checked><span class="swatch" style="background:#1f77b4;"></span>MAC</label>
        <label class="check-row"><input type="checkbox" id="mrs"><span class="swatch" style="background:#2ca02c;"></span>MRS</label>
        <label class="check-row"><input type="checkbox" id="tsa"><span class="swatch" style="background:#d62728;"></span>TSA</label>
      </div>

      <div class="control-group">
        <h2>Chemical</h2>
        <label class="check-row"><input type="checkbox" id="tkn"><span class="swatch" style="background:#9467bd;"></span>Nitrogen (TKN)</label>
        <label class="check-row"><input type="checkbox" id="phosphorus"><span class="swatch" style="background:#ff7f0e;"></span>Phosphorus</label>
        <label class="check-row"><input type="checkbox" id="potassium"><span class="swatch" style="background:#8c564b;"></span>Potassium</label>
        <label class="check-row"><input type="checkbox" id="sulfur"><span class="swatch" style="background:#e377c2;"></span>Sulfur</label>
      </div>

      <div class="control-group">
        <h2>pH</h2>
        <label class="check-row"><input type="checkbox" id="ph"><span class="swatch" style="background:#17becf;"></span>pH</label>
      </div>

      <div class="note">
        <b>Note:</b><br>
        These layers are scaled within each variable from 0 to 1. Use the individual variable pages to view true values, including pH.
      </div>
    </div>

    <div class="main">
      <div id="plot"></div>
    </div>
  </div>

  <script>
    const xVals = [1,2,3,4,5,6,7];
    const yVals = [1,2,3,4];

    function oneColorScale(color) {
      return [[0, color], [1, color]];
    }

    const traces = [
      {
        x: xVals, y: yVals, z: [[0.4941,0.4449,0.8054,0.0978,0.2943,0.0984,0.8622],[0.4774,0.584,0.1375,0.1271,0.6494,0.7571,1],[0.4872,0.4824,0.0537,0,0.2981,0.4574,0.4637],[0.3776,0.2753,0.3852,0.467,0.2914,0.3646,0.4247]],
        type: "surface", name: "MAC",
        colorscale: oneColorScale("#1f77b4"),
        showscale: false, opacity: 0.58, visible: true
      },
      {
        x: xVals, y: yVals, z: [[0.7403,0.9052,0.7858,0.6417,0.6722,0,0.5808],[0.3693,0.3374,0.4825,0.5009,0.3844,0.9426,1],[0.8962,0.1818,0.2063,0.4393,0.4173,0.7249,0.9176],[0.3647,0.6138,0.2342,0.2988,0.7196,0.246,0.8672]],
        type: "surface", name: "MRS",
        colorscale: oneColorScale("#2ca02c"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[0.7134,1,0.7757,0,0.7562,0.4578,0.8886],[0.8625,0.2153,0.4632,0.2649,0.3309,0.9169,0.8358],[0.6351,0.4867,0.0656,0.4361,0.4501,0.6217,0.914],[0.5122,0.1674,0.5491,0.9672,0.4831,0.5336,0.9212]],
        type: "surface", name: "TSA",
        colorscale: oneColorScale("#d62728"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[0.1933,0.2745,0.3206,0.2853,0,0.2086,0.0475],[0.3221,0.2791,0.2117,0.1304,0.0491,0.0997,1],[0.3727,0.4187,0.1258,0.0215,0.0629,0.1794,0.6135],[0.339,0.3206,0.1733,0.115,0.1166,0.2117,0.2086]],
        type: "surface", name: "TKN",
        colorscale: oneColorScale("#9467bd"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[0.7431,0.5139,0.4653,0.2847,0.6528,0.6458,0.6042],[0.2986,0.5347,0.1944,0.2917,0.2778,0.2361,0.5208],[0.0347,0.2847,0.2361,0.1597,0,0.1458,0.3542],[0.0903,0.3056,0.0833,0.2986,0.2361,0.4271,1]],
        type: "surface", name: "Phosphorus",
        colorscale: oneColorScale("#ff7f0e"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[0.6216,0.5135,0.5676,0.5045,0.5045,1,0.5856],[0.3243,0.3784,0.1892,0.4144,0.3604,0.3784,0.5856],[0,0.3153,0.3423,0.2342,0.036,0.2342,0.5856],[0.027,0.3874,0.2162,0.2973,0.2432,0.7207,0.9099]],
        type: "surface", name: "Potassium",
        colorscale: oneColorScale("#8c564b"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[0.5,1,0.9167,0.5,0.5,0.5,0.25],[0.25,0.8333,0.5,0.6667,0.25,0.25,0.4167],[0.1667,0.5833,0.3333,0.0833,0,0,0.5833],[0.0833,0.5,0.25,0.25,0.5,0.375,0.5]],
        type: "surface", name: "Sulfur",
        colorscale: oneColorScale("#e377c2"),
        showscale: false, opacity: 0.58, visible: false
      },
      {
        x: xVals, y: yVals, z: [[1,0.6812,0.8338,0.6567,0.624,0.5368,0.3025],[0.5123,0.6921,0.6403,0.1608,0.1008,0.4169,0.6921],[0.3515,0.6757,0.3297,0.4033,0.2071,0,0.7766],[0.8828,0.3787,0.6839,0.327,0.3924,0.4986,0.8256]],
        type: "surface", name: "pH",
        colorscale: oneColorScale("#17becf"),
        showscale: false, opacity: 0.58, visible: false
      },

      {
        x: [2,4], y: [1,1], z: [1.02,1.02],
        type: "scatter3d", mode: "lines",
        line: {color:"#1f77b4", width:8},
        name: "Water Line", showlegend: false
      },
      {
        x: [3], y: [1], z: [1.08],
        type: "scatter3d", mode: "text",
        text: ["Water Line"],
        textfont: {color:"darkblue", size:12},
        showlegend: false
      },
      {
        x: [4.5], y: [2.5], z: [1.08],
        type: "scatter3d", mode: "text",
        text: ["Feeder"],
        textfont: {color:"red", size:12},
        showlegend: false
      },
      {
        x: Array.from({length:100}, (_,i) => 4.5 + 0.5*Math.cos(i*2*Math.PI/99)),
        y: Array.from({length:100}, (_,i) => 2.5 + 0.5*Math.sin(i*2*Math.PI/99)),
        z: Array.from({length:100}, () => 1.02),
        type: "scatter3d", mode: "lines",
        line: {color:"red", width:4},
        name: "Feeder", showlegend: false
      },
      {
        x: [6.5,6.5], y: [1,4], z: [1.02,1.02],
        type: "scatter3d", mode: "lines",
        line: {color:"#1f0010", width:8},
        name: "Enrichment Area", showlegend: false
      },
      {
        x: [6.5], y: [2.5], z: [1.08],
        type: "scatter3d", mode: "text",
        text: ["Enrichment Area"],
        textfont: {color:"#1f0010", size:12},
        showlegend: false
      },
      {
        x: [1,1], y: [1,2], z: [1.02,1.02],
        type: "scatter3d", mode: "lines",
        line: {color:"#4f1000", width:8},
        name: "Entrance Door", showlegend: false
      },
      {
        x: [1], y: [1.5], z: [1.08],
        type: "scatter3d", mode: "text",
        text: ["Entrance"],
        textfont: {color:"#4f1000", size:12},
        showlegend: false
      }
    ];

    const layout = {
      title: "Pen 1 Overlay Viewer (Scaled Surfaces)",
      margin: {l:0, r:0, b:0, t:60},
      scene: {
        xaxis: {title:"X-Axis", tickvals:[1,2,3,4,5,6,7], ticktext:[0,18,36,54,72,90,108], range:[1,7]},
        yaxis: {title:"Y-Axis", tickvals:[1,2,3,4], ticktext:[0,18,36,54], range:[1,4]},
        zaxis: {title:"Scaled Intensity", range:[0,1.12]},
        aspectmode: "manual",
        aspectratio: {x:2, y:1, z:0.55}
      }
    };

    Plotly.newPlot("plot", traces, layout, {responsive:true});

    const mapping = {
      mac: 0,
      mrs: 1,
      tsa: 2,
      tkn: 3,
      phosphorus: 4,
      potassium: 5,
      sulfur: 6,
      ph: 7
    };

    Object.keys(mapping).forEach(function(id) {
      document.getElementById(id).addEventListener("change", function() {
        Plotly.restyle("plot", {visible: this.checked}, [mapping[id]]);
      });
    });
  </script>
</body>
</html>
